<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat Seguro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --surface2: #1e2230;
      --border: #2a2f42;
      --accent: #4f7cff;
      --accent2: #8b5cf6;
      --text: #e8eaf0;
      --text-dim: #6b7280;
      --mine-bg: linear-gradient(135deg, #4f7cff 0%, #7c5cfc 100%);
      --other-bg: #1e2230;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
    }

    /* ─── LOCK SCREEN ─── */
    #lock-screen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      z-index: 50;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #lock-screen.hidden-lock {
      opacity: 0; pointer-events: none; transform: scale(1.04);
    }
    .lock-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      width: min(90vw, 380px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(79,124,255,0.08);
      text-align: center;
    }
    .lock-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg,#4f7cff22,#7c5cfc22);
      border: 1px solid #4f7cff44;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 24px;
    }
    .lock-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px; font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .lock-sub { color: var(--text-dim); font-size: 14px; margin-bottom: 28px; }

    .lock-input-wrap { position: relative; margin-bottom: 16px; }
    .lock-input {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px 14px 44px;
      color: var(--text);
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      letter-spacing: 4px;
      transition: border-color 0.2s;
    }
    .lock-input:focus { border-color: var(--accent); }
    .lock-input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-dim); font-size: 16px;
    }
    .lock-btn {
      width: 100%;
      background: linear-gradient(135deg, #4f7cff, #7c5cfc);
      border: none; border-radius: 12px;
      padding: 14px;
      color: #fff; font-size: 15px; font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.2s, transform 0.1s;
    }
    .lock-btn:hover { opacity: 0.9; }
    .lock-btn:active { transform: scale(0.98); }
    #lock-error {
      color: #f87171; font-size: 13px; margin-top: 12px;
      min-height: 18px; transition: opacity 0.2s;
    }

    /* ─── CHAT APP ─── */
    #chat-app {
      display: flex; flex-direction: column;
      height: 100dvh;
      opacity: 0; transition: opacity 0.5s ease 0.2s;
    }
    #chat-app.visible { opacity: 1; }

    /* Header */
    .chat-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex; align-items: center; gap: 14px;
      flex-shrink: 0;
    }
    .header-avatar {
      width: 40px; height: 40px;
      background: linear-gradient(135deg,#4f7cff,#7c5cfc);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-info { flex: 1; }
    .header-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 16px; letter-spacing: -0.3px;
    }
    .header-status {
      font-size: 12px; color: var(--text-dim);
      display: flex; align-items: center; gap: 5px;
    }
    .status-dot {
      width: 7px; height: 7px;
      background: #4ade80; border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }
    .sender-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px; color: var(--text-dim);
      display: flex; align-items: center; gap: 6px;
      cursor: pointer;
      transition: border-color 0.2s;
      white-space: nowrap;
    }
    .sender-pill:hover { border-color: var(--accent); color: var(--text); }
    .sender-pill b { color: var(--accent); }

    /* Messages area */
    #messages-area {
      flex: 1; overflow-y: auto;
      padding: 20px 16px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }
    #messages-area::-webkit-scrollbar { width: 4px; }
    #messages-area::-webkit-scrollbar-track { background: transparent; }
    #messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .msg-wrapper {
      display: flex; align-items: flex-end; gap: 8px;
      animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(8px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .msg-wrapper.mine { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }
    .msg-avatar.other-av { background: var(--surface2); border: 1px solid var(--border); }
    .msg-avatar.mine-av  { background: linear-gradient(135deg,#4f7cff,#7c5cfc); }

    .msg-bubble {
      max-width: min(72%, 340px);
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 14.5px; line-height: 1.5;
      word-break: break-word;
    }
    .msg-bubble.mine {
      background: var(--mine-bg);
      color: #fff;
      border-bottom-right-radius: 5px;
    }
    .msg-bubble.other {
      background: var(--other-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 5px;
    }
    .msg-time {
      font-size: 10px; color: var(--text-dim);
      margin-top: 4px;
      text-align: right;
    }
    .msg-time.other-time { text-align: left; }

    /* Date divider */
    .date-divider {
      display: flex; align-items: center; gap: 10px;
      color: var(--text-dim); font-size: 11px;
      margin: 8px 0;
    }
    .date-divider::before, .date-divider::after {
      content:''; flex:1; height:1px; background: var(--border);
    }

    /* Empty state */
    #empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-dim); text-align: center; gap: 8px;
    }
    #empty-state .empty-icon { font-size: 40px; margin-bottom: 4px; }
    #empty-state p { font-size: 14px; }

    /* Input area */
    .chat-input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      display: flex; align-items: flex-end; gap: 10px;
      flex-shrink: 0;
    }
    #msg-input {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 11px 16px;
      color: var(--text);
      font-size: 14.5px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--text-dim); }
    .send-btn {
      width: 44px; height: 44px;
      background: linear-gradient(135deg,#4f7cff,#7c5cfc);
      border: none; border-radius: 13px;
      color: #fff; font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }
    .send-btn:hover { opacity: 0.9; }
    .send-btn:active { transform: scale(0.94); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Sender modal */
    #sender-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 40; backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    #sender-modal.open { opacity: 1; pointer-events: all; }
    .sender-modal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      width: min(88vw, 320px);
      text-align: center;
    }
    .sender-modal-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; margin-bottom:6px; }
    .sender-modal-sub { color:var(--text-dim); font-size:13px; margin-bottom:22px; }
    .sender-btn {
      width: 100%; padding: 13px;
      border-radius: 12px; border: 1.5px solid var(--border);
      background: var(--surface2); color: var(--text);
      font-size: 14px; font-weight: 500;
      cursor: pointer; margin-bottom: 10px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, background 0.2s;
      display: flex; align-items: center; gap: 10px;
    }
    .sender-btn:hover { border-color: var(--accent); background: var(--bg); }
    .sender-btn .sb-icon {
      width: 32px; height: 32px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center; font-size:16px;
    }
  </style>
</head>
<body>

<!-- ═══════════════ LOCK SCREEN ═══════════════ -->
<div id="lock-screen">
  <div class="lock-card">
    <div class="lock-icon">🔐</div>
    <div class="lock-title">Acesso Restrito</div>
    <p class="lock-sub">Digite a senha para entrar no chat seguro</p>
    <div class="lock-input-wrap">
      <span class="lock-input-icon">🔑</span>
      <input class="lock-input" id="password-input" type="password"
             placeholder="••••••••" autocomplete="off"
             onkeydown="if(event.key==='Enter') checkPassword()"/>
    </div>
    <button class="lock-btn" onclick="checkPassword()">Entrar</button>
    <div id="lock-error"></div>
  </div>
</div>

<!-- ═══════════════ CHAT APP ═══════════════ -->
<div id="chat-app">

  <!-- Header -->
  <header class="chat-header">
    <div class="header-avatar">💬</div>
    <div class="header-info">
      <div class="header-title">Chat Seguro</div>
      <div class="header-status">
        <span class="status-dot"></span>
        <span>Online em tempo real</span>
      </div>
    </div>
    <button class="sender-pill" onclick="openSenderModal()" title="Trocar identidade">
      🙂 <b id="sender-label">Eu</b> ▾
    </button>
  </header>

  <!-- Messages -->
  <div id="messages-area">
    <div id="empty-state">
      <div class="empty-icon">💬</div>
      <p>Sem mensagens ainda.<br>Seja o primeiro a dizer oi!</p>
    </div>
  </div>

  <!-- Input -->
  <div class="chat-input-area">
    <textarea id="msg-input" rows="1" placeholder="Digite uma mensagem…"
      oninput="autoResize(this)"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
    ></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Enviar">
      ➤
    </button>
  </div>
</div>

<!-- Sender modal -->
<div id="sender-modal">
  <div class="sender-modal-card">
    <div class="sender-modal-title">Quem é você?</div>
    <p class="sender-modal-sub">Escolha sua identidade neste chat</p>
    <button class="sender-btn" onclick="setSender('user1')">
      <span class="sb-icon" style="background:linear-gradient(135deg,#4f7cff,#7c5cfc)">🙂</span>
      <span>Usuário 1 <span style="color:var(--text-dim);font-size:12px">(mensagens à direita)</span></span>
    </button>
    <button class="sender-btn" onclick="setSender('user2')">
      <span class="sb-icon" style="background:var(--surface2);border:1px solid var(--border)">😊</span>
      <span>Usuário 2 <span style="color:var(--text-dim);font-size:12px">(mensagens à esquerda)</span></span>
    </button>
  </div>
</div>

<!-- ═══════════════ FIREBASE ═══════════════ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCUm1MbMiRkjHgsQehmw_OreZpb2jsMxIo",
    authDomain: "chat-cb31d.firebaseapp.com",
    projectId: "chat-cb31d",
    storageBucket: "chat-cb31d.firebasestorage.app",
    messagingSenderId: "692795678364",
    appId: "1:692795678364:web:7f8efd1ebfa6ec88db5759"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  let currentSender = localStorage.getItem('chatSender') || 'user1';
  updateSenderLabel();

  // ── Listen to messages ──
  const messagesRef = collection(db, 'messages');
  const q = query(messagesRef, orderBy('timestamp', 'asc'));

  let firstLoad = true;
  onSnapshot(q, (snapshot) => {
    const area = document.getElementById('messages-area');
    const empty = document.getElementById('empty-state');

    snapshot.docChanges().forEach(change => {
      if (change.type === 'added') {
        const data = change.doc.data();
        if (empty) empty.remove();
        renderMessage(data, area);
      }
    });

    if (!firstLoad) return;
    firstLoad = false;
    scrollBottom(area);
  });

  // ── Render a message bubble ──
  function renderMessage(data, area) {
    const isMine = data.senderId === currentSender;

    const wrapper = document.createElement('div');
    wrapper.className = `msg-wrapper ${isMine ? 'mine' : 'other'}`;

    const av = document.createElement('div');
    av.className = `msg-avatar ${isMine ? 'mine-av' : 'other-av'}`;
    av.textContent = isMine ? '🙂' : '😊';

    const col = document.createElement('div');

    const bubble = document.createElement('div');
    bubble.className = `msg-bubble ${isMine ? 'mine' : 'other'}`;
    bubble.textContent = data.texto;

    const time = document.createElement('div');
    time.className = `msg-time ${isMine ? '' : 'other-time'}`;
    const ts = data.timestamp?.toDate ? data.timestamp.toDate() : new Date();
    time.textContent = ts.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});

    col.appendChild(bubble);
    col.appendChild(time);
    wrapper.appendChild(av);
    wrapper.appendChild(col);
    area.appendChild(wrapper);
    scrollBottom(area);
  }

  function scrollBottom(area) {
    area.scrollTop = area.scrollHeight;
  }

  // ── Send message ──
  window.sendMessage = async function() {
    const input = document.getElementById('msg-input');
    const texto = input.value.trim();
    if (!texto) return;
    input.value = '';
    autoResize(input);

    try {
      await addDoc(messagesRef, {
        texto,
        timestamp: serverTimestamp(),
        senderId: currentSender
      });
    } catch(e) {
      console.error('Erro ao enviar:', e);
      alert('Erro ao enviar mensagem. Verifique o Firestore.');
    }
  };

  // ── Sender management ──
  window.setSender = function(id) {
    currentSender = id;
    localStorage.setItem('chatSender', id);
    updateSenderLabel();
    closeSenderModal();
    // Reload to re-render all bubbles with correct ownership
    location.reload();
  };

  function updateSenderLabel() {
    const el = document.getElementById('sender-label');
    if (el) el.textContent = currentSender === 'user1' ? 'Usuário 1' : 'Usuário 2';
  }

  window.openSenderModal  = () => document.getElementById('sender-modal').classList.add('open');
  window.closeSenderModal = () => document.getElementById('sender-modal').classList.remove('open');
  document.getElementById('sender-modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('sender-modal')) closeSenderModal();
  });
</script>

<!-- ═══════════════ LOCK LOGIC ═══════════════ -->
<script>
  function checkPassword() {
    const val = document.getElementById('password-input').value;
    const err = document.getElementById('lock-error');
    if (val === 'batata') {
      document.getElementById('lock-screen').classList.add('hidden-lock');
      const chat = document.getElementById('chat-app');
      chat.style.display = 'flex';
      setTimeout(() => chat.classList.add('visible'), 50);
      err.textContent = '';
    } else {
      err.textContent = '🚫 Acesso Negado';
      document.getElementById('password-input').value = '';
      document.getElementById('password-input').classList.add('shake');
      setTimeout(() => document.getElementById('password-input').classList.remove('shake'), 500);
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // Start with chat hidden
  document.getElementById('chat-app').style.display = 'none';
</script>

<style>
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }
  .shake { animation: shake 0.4s ease; }
</style>
</body>
</html>
